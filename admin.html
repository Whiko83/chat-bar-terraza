<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grada Virtual</title>
    <style>
        :root { 
            --accent: #00e5ff; 
            --text: #e0e0e0; 
        }
        
        body { 
            font-family: sans-serif; 
            margin: 0; 
            color: var(--text); 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            
            /* NUEVO: IMAGEN DE FONDO DEL ESTADIO */
            background-image: url('https://images.unsplash.com/photo-1518605368461-1ee7c5320d73?ixlib=rb-4.0.3&auto=format&fit=crop&w=1500&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        
        /* NUEVO: EFECTO CRISTAL (Fondo negro semitransparente + Desenfocado) */
        header { 
            background: rgba(20, 20, 20, 0.85); /* 85% opaco */
            backdrop-filter: blur(10px); /* Desenfoque estilo Apple */
            padding: 15px; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        #contador { font-size: 14px; color: var(--accent); }

        #seleccion-equipo { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(10, 10, 10, 0.95); /* Casi negro para que no distraiga al elegir */
            backdrop-filter: blur(15px);
            z-index: 100; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; padding: 20px; box-sizing: border-box;
        }
        .btn-equipo { 
            width: 100%; max-width: 300px; padding: 20px; margin: 10px; 
            border: 2px solid var(--accent); background: rgba(0, 0, 0, 0.5); 
            color: white; font-size: 18px; border-radius: 10px; cursor: pointer;
            backdrop-filter: blur(5px);
            transition: 0.3s;
        }
        .btn-equipo:hover { background: var(--accent); color: black; }

        /* EL HISTORIAL AHORA ES MÁS TRANSPARENTE PARA DEJAR VER EL ESTADIO */
        #chat-historial { 
            flex-grow: 1; 
            padding: 20px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            background: rgba(0, 0, 0, 0.6); /* 60% opaco, deja ver la imagen */
            backdrop-filter: blur(4px);
        }
        
        .msg { background: rgba(40, 40, 40, 0.9); padding: 10px 15px; border-radius: 8px; max-width: 85%; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .msg-propio { align-self: flex-end; background: rgba(0, 123, 255, 0.9); }
        .equipo-tag { font-weight: bold; font-size: 12px; display: block; margin-bottom: 4px; color: var(--accent); }
        
        .controles { 
            display: flex; 
            padding: 10px; 
            background: rgba(20, 20, 20, 0.85); 
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.1); 
        }
        input { flex-grow: 1; padding: 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.5); color: white; outline: none; }
        input::placeholder { color: #aaa; }
        button#btnEnviar { background: none; border: none; color: var(--accent); font-size: 24px; cursor: pointer; margin-left: 10px; }
    </style>
</head>
<body>

    <div id="seleccion-equipo">
        <h2>¿De qué equipo eres?</h2>
        <div id="lista-equipos">Esperando configuración del bar...</div>
    </div>

    <header>
        <span id="titulo-bar">Cargando...</span>
        <span id="contador">0 personas online</span>
    </header>

    <div id="chat-historial"></div>

    <div class="controles">
        <input id="cajaTexto" type="text" placeholder="Escribe un mensaje..." autocomplete="off">
        <button id="btnEnviar" onclick="enviarMensaje()">➤</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let miEquipo = "";
        const params = new URLSearchParams(window.location.search);
        const nombreBar = params.get('bar') || "Bar Genérico";

        document.getElementById('titulo-bar').innerText = nombreBar;
        socket.emit('unirse_sala', nombreBar);

        socket.on('configuracion_equipos', (equipos) => {
            const contenedor = document.getElementById('lista-equipos');
            contenedor.innerHTML = "";
            if (equipos.length === 0) {
                contenedor.innerText = "El dueño aún no ha configurado los equipos de hoy.";
                return;
            }
            equipos.forEach(eq => {
                const btn = document.createElement('button');
                btn.className = "btn-equipo";
                btn.innerText = eq;
                btn.onclick = () => {
                    miEquipo = eq;
                    document.getElementById('seleccion-equipo').style.display = 'none';
                };
                contenedor.appendChild(btn);
            });
        });

        socket.on('actualizar_contador', (n) => {
            document.getElementById('contador').innerText = `${n} personas online`;
        });

        socket.on('nuevo_comentario', (datos) => {
            dibujarMensaje(datos.equipo, datos.texto, false);
        });

        function enviarMensaje() {
            const caja = document.getElementById('cajaTexto');
            if (caja.value.trim() !== "" && miEquipo !== "") {
                socket.emit('enviar_comentario', { texto: caja.value, equipo: miEquipo });
                dibujarMensaje(miEquipo, caja.value, true);
                caja.value = "";
            }
        }

        // Permitir usar la tecla Enter
        document.getElementById('cajaTexto').addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                document.getElementById('btnEnviar').click();
            }
        });

        function dibujarMensaje(equipo, texto, esPropio) {
            const div = document.createElement('div');
            div.className = "msg" + (esPropio ? " msg-propio" : "");
            div.innerHTML = `<span class="equipo-tag">${equipo}</span> ${texto}`;
            document.getElementById('chat-historial').appendChild(div);
            document.getElementById('chat-historial').scrollTop = document.getElementById('chat-historial').scrollHeight;
        }

        socket.on('orden_limpiar_chat', () => document.getElementById('chat-historial').innerHTML = "");
        socket.on('aviso_spam', (m) => alert(m));
        
        socket.on('orden_cerrar_chat', () => {
            document.getElementById('cajaTexto').disabled = true;
            document.getElementById('btnEnviar').disabled = true;
            document.getElementById('cajaTexto').placeholder = "Chat cerrado 🔒";
        });

        socket.on('orden_abrir_chat', () => {
            document.getElementById('cajaTexto').disabled = false;
            document.getElementById('btnEnviar').disabled = false;
            document.getElementById('cajaTexto').placeholder = "Escribe un mensaje...";
        });
    </script>
</body>
</html>
