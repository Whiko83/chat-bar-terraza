<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Grada Virtual</title>
    <style>
        :root { --accent: #00e5ff; --bg: #121212; --card: #1e1e1e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; padding: 20px; margin: 0; }
        .container { max-width: 500px; margin: 0 auto; }
        h1 { color: var(--accent); text-align: center; font-size: 24px; }
        
        .card { background: var(--card); padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .card h3 { margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px; font-size: 18px; }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #2a2a2a; color: white; box-sizing: border-box; }
        
        button { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; transition: 0.2s; }
        .btn-main { background: var(--accent); color: #000; }
        .btn-main:active { transform: scale(0.98); }
        .btn-open { background: #28a745; color: white; }
        .btn-close { background: #dc3545; color: white; }
        .btn-clear { background: #ffc107; color: black; }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="bar-display">Panel de Administración</h1>

        <div class="card">
            <h3>🏟️ Configurar Partido</h3>
            <div class="input-group">
                <label>Equipo Local</label>
                <input id="eq1" type="text" placeholder="Ej: Real Madrid">
                <input id="img1" type="text" placeholder="URL del escudo (Opcional)">
            </div>
            <div class="input-group">
                <label>Equipo Visitante</label>
                <input id="eq2" type="text" placeholder="Ej: FC Barcelona">
                <input id="img2" type="text" placeholder="URL del escudo (Opcional)">
            </div>
            <button class="btn-main" onclick="actualizarPartido()">Actualizar Grada Virtual</button>
        </div>

        <div class="card">
            <h3>⚙️ Gestión del Chat</h3>
            <button class="btn-open" onclick="enviarOrden('admin_abrir_chat')">Abrir Chat</button>
            <button class="btn-close" onclick="enviarOrden('admin_cerrar_chat')">Cerrar Chat</button>
            <button class="btn-clear" onclick="enviarOrden('admin_limpiar_chat')">Vaciar Mensajes</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const params = new URLSearchParams(window.location.search);
        const barId = params.get('bar') || "Bar Genérico";
        document.getElementById('bar-display').innerText = "Panel: " + barId;

        socket.emit('unirse_sala', barId);

        function actualizarPartido() {
            const data = {
                bar: barId,
                equipo1: { nombre: document.getElementById('eq1').value, escudo: document.getElementById('img1').value },
                equipo2: { nombre: document.getElementById('eq2').value, escudo: document.getElementById('img2').value }
            };
            if(data.equipo1.nombre && data.equipo2.nombre) {
                socket.emit('admin_configurar_equipos', data);
                alert("Partido actualizado correctamente.");
            } else {
                alert("Debes poner al menos los nombres de los equipos.");
            }
        }

        function enviarOrden(orden) {
            if(orden === 'admin_limpiar_chat' && !confirm("¿Borrar todos los mensajes?")) return;
            socket.emit(orden, barId);
        }
    </script>
</body>
</html>
